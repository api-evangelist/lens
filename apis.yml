apis:
  - aid: lens:lens-api
    name: Lens API
    description: The Lens API exposes the full corpus of Lens scholarly works and patents via a REST interface. Search endpoints
      accept Elasticsearch-style query DSL via POST or simple Lucene query strings via GET, with cursor-based pagination, field
      projection, sorting, stemming controls, and patent family grouping. Authentication is via a bearer token issued from the
      Lens user profile.
    humanURL: https://docs.api.lens.org/
    baseURL: https://api.lens.org
