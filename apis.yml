aid: lens
name: Lens
description: Lens is an open knowledge platform from Cambia that aggregates global scholarly works and patent records and
  exposes them through a REST API. The versioned API supports rich Elasticsearch-style queries, cursor pagination, and field
  projection across the full Lens scholarly and patent corpora, enabling research, science policy, technology landscape, and
  patent intelligence applications.
type: Index
position: Consumer
access: 3rd-Party
